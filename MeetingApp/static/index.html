<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Meeting Scheduler</title>
</head>

<body>
    <h1>Meeting Setup</h1>
    <form id="meetingForm">
        <input type="text" id="host" placeholder="Host Name" required><br>
        <input type="text" id="meeting_name" placeholder="Meeting Topic" required><br>
        <input type="datetime-local" id="date_time" required><br>
        <button type="submit">Create & Sign Meeting</button>
    </form>
    <div id="response"></div>
    <script src="app.js"></script>
</body>

</html>
